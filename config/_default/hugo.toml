baseurl = "https://sanntid.org"
DefaultContentLanguage = "en"
title = "sanntid.org"
theme = "beautifulhugo"
pygmentsStyle = "trac"
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
#pygmentsUseClassic = true
#pygmentOptions = "linenos=inline"
ignoreFiles = ['\.obsidian$', '\.git$', 'cache$']

[languages]
  [languages.en]
    contentDir = "content/en" # English
    languageName = "English"
    weight = 10
  [languages.no]
    contentDir = "content/no" # Norwegian
    languageName = "Norsk"
    weight = 20

[pagination]
  pagerSize = 20
  path = 'page'

[Params]
  #homeTitle = "Sanntid"
  #subtitle = "ramblings of a sysadmin"
  mainSections = ["post","posts"]
  logo = "img/avatar-ny.webp"
  favicon = "img/favicon.ico"
  dateFormat = "2006-01-02"
  commit = false
  rss = true
  comments = false
  readingTime = true
  wordCount = true
  useHLJS = true
  socialShare = false
  delayDisqus = false
  showRelatedPosts = true
  related_content_limit = 5

#  cusdisID = "XXX" # Get your App id from cusdis.com
  hideAuthor = true
#  gcse = "012345678901234567890:abcdefghijk" # Get your code from google.com/cse. Make sure to go to "Look and Feel" and change Layout to "Full Width" and Theme to "Classic"
#  disclaimerText = "The opinions expressed herein are my own personal opinions and do not represent my employer’s view in any way."

